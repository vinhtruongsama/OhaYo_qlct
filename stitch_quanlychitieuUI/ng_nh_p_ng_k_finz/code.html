<script>
        function toggleAuth(type) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const header = document.getElementById('form-header');

            if (type === 'register') {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                header.innerHTML = `
                    <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Bắt đầu cùng FinZ</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant">Hãy điền các thông tin sau để thiết lập tài khoản của bạn.</p>
                `;
            } else {
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                header.innerHTML = `
                    <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Mừng bạn quay trở lại!</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant">Vui lòng nhập thông tin để đăng nhập vào tài khoản.</p>
                `;
            }
        }

        // Add floating animation for illustration
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0% { transform: translateY(0px); }
                50% { transform: translateY(-15px); }
                100% { transform: translateY(0px); }
            }
            .animate-float {
                animation: float 4s ease-in-out infinite;
            }
        `;
        document.head.appendChild(style);
    </script>
